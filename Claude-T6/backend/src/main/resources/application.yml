server:
  port: 8080

spring:
  application:
    name: iot-subscription

  datasource:
    url: jdbc:mysql://localhost:3306/iot_subscription?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: ingestion-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

webhook:
  master-key: ${WEBHOOK_MASTER_KEY:dGVzdC1tYXN0ZXIta2V5LTI1Ni1iaXQ=}
  pool:
    max-connections: 200
    connect-timeout: 5000
    read-timeout: 10000
  retry:
    max-attempts: 5
    base-seconds: 30
    multiplier: 2
    max-delay-seconds: 1800
  ssrf:
    allow-http: ${WEBHOOK_SSRF_ALLOW_HTTP:false}
  quota:
    max-endpoints-per-tenant: 50
    max-subscriptions-per-user: 100
    max-push-rate-per-tenant: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.project.subscription: DEBUG
    org.springframework.kafka: WARN

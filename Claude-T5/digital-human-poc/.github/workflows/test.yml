name: Tests

on:
  push:
    branches: [master]
    paths:
      - 'digital-human-poc/**'
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: digital-human-poc

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Run tests with coverage
        run: python -m pytest tests/ --cov=src --cov-report=term-missing --tb=short -q

      - name: Coverage check (>= 50%)
        run: |
          python -m pytest tests/ --cov=src --cov-fail-under=50 -q
